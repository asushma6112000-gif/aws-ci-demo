version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11

  pre_build:
    commands:
      - echo "Installing dependencies"
      - pip install -r requirements.txt

  build:
    commands:
      - echo "Building Docker image"
      - docker build -t aws-ci-demo .

  post_build:
    commands:
      - echo "Build completed successfully"
